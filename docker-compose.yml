services:
  postgres:
    image: postgres:16
    container_name: gtfs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gtfs_ticketing
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./db/sample_data.sql:/docker-entrypoint-initdb.d/02_sample_data.sql:ro
      - ./db/extend_ticketing.sql:/docker-entrypoint-initdb.d/03_extend_ticketing.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gtfs_ticketing"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
