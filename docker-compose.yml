services:
  postgres:
    image: postgres:16
    container_name: gtfs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gtfs_ticketing
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./:/work:ro
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ./data/gtfs/incoming/import_BRI.sql:/docker-entrypoint-initdb.d/02_import_BRI.sql:ro
      - ./data/gtfs/incoming/import_BOL.sql:/docker-entrypoint-initdb.d/03_import_BOL.sql:ro
      - ./db/extend_ticketing.sql:/docker-entrypoint-initdb.d/04_extend_ticketing.sql:ro
      - ./db/agency_ticketing.sql:/docker-entrypoint-initdb.d/05_agency_ticketing.sql:ro
      - ./db/seed_time_ticket_types.sql:/docker-entrypoint-initdb.d/06_seed_time_ticket_types.sql:ro
      - ./db/indexes.sql:/docker-entrypoint-initdb.d/07_indexes.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gtfs_ticketing"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
